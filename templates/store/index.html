{% extends 'layouts/base.html' %}
{% block title %}
thisShop | Is The Shop
{% endblock title %}

{% block content %}
{% include 'inc/hero.html' %}
<div class="container mx-auto sm:px-4" style="margin-top:70px;" >
    <div class="flex flex-wrap ">
      <div class="w-full">
        <h4 class="mb-3"> Latest Offfers</h4>
        <hr style="border-color:#b8bfc2;">
      </div>
      {% for item in products %}
      <div class="card card-compact w-96 glass duration-500 hover:scale-105 hover:shadow-xl">
        <figure><img src="{{item.product_image.url}}" alt="Shoes" /></figure>
        <div class="card-body">
          <h2 class="card-title">{{ item.name }}</h2>
          <p>{{ item.description }}</p>
          <div class="card-actions justify-end">
            <button class="btn btn-primary">Add to Cart</button>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
    </div>
  </div>
  {% endblock content %}
